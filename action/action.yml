name: "SHIELD Scanner"
description: "Run SHIELD Framework container and generate report.html from report.json"
inputs:
  target_url:
    description: "Target URL (https://example.com)"
    required: true
  mode:
    description: "posture|authorized"
    required: true
    default: "posture"
  profile:
    description: "quick|standard|deep"
    required: true
    default: "standard"
  auth_file_path:
    description: "Path to authorization file in workspace (required for authorized)"
    required: false
  image:
    description: "SHIELD Framework container image"
    required: false
    default: "ghcr.io/georges034302/shield-framework:latest"

runs:
  using: "composite"
  steps:
    - name: Run SHIELD container
      shell: bash
      run: |
        bash action/scripts/run_container.sh "${{ inputs.image }}" "${{ inputs.target_url }}" "${{ inputs.mode }}" "${{ inputs.profile }}" "${{ inputs.auth_file_path }}"
    - name: Render HTML from JSON
      shell: bash
      run: |
        bash action/scripts/render_html.sh
