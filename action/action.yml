name: "SHIELD Scanner"
description: "Clone and run SHIELD Framework, generate report.html from report.json"
inputs:
  target_url:
    description: "Target URL (https://example.com)"
    required: true
  mode:
    description: "posture|authorized"
    required: true
    default: "posture"
  profile:
    description: "quick|standard|deep"
    required: true
    default: "standard"
  auth_file_path:
    description: "Path to authorization file in workspace (required for authorized)"
    required: false

runs:
  using: "composite"
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq jq dnsutils netcat-openbsd
    - name: Run SHIELD Framework
      shell: bash
      run: |
        bash action/scripts/run_container.sh "${{ inputs.target_url }}" "${{ inputs.mode }}" "${{ inputs.profile }}" "${{ inputs.auth_file_path }}"
    - name: Render HTML from JSON
      shell: bash
      run: |
        bash action/scripts/render_html.sh
